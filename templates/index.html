<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistem Penerjemah BISINDO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="text-center mb-4">
        <h1 class="fw-bold">
            Sistem Penerjemah Bahasa Isyarat BISINDO
        </h1>

        <p class="text-muted">
            Menggunakan MediaPipe dan Machine Learning
        </p>
    </div>

    <div class="row">

        <!-- Webcam -->
        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    Kamera Realtime
                </div>

                <div class="card-body text-center">

                    <img
                        src="{{ url_for('video') }}"
                        class="img-fluid rounded"
                    >

                </div>

            </div>

        </div>

        <!-- Informasi -->
        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-header bg-success text-white">
                    Informasi Sistem
                </div>

                <div class="card-body">

                    <h5>Mode Aktif</h5>

                    <select
                        id="modeSelect"
                        class="form-select"
                    >
                         <option value="huruf">
                            Huruf & Angka (MLP)
                        </option>

                        <option value="kata">
                            Kata BISINDO (Random Forest)
                        </option>

                    </select>

                    <hr>

                    <p>
                        <strong>Model Huruf:</strong><br>
                        MediaPipe + MLP
                    </p>

                    <p>
                        <strong>Model Kata:</strong><br>
                        MediaPipe + Random Forest
                    </p>

                    <hr>

                    <div class="alert alert-info">
                        Tampilkan gestur tangan di depan kamera
                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

const modeSelect =
    document.getElementById(
        "modeSelect"
    );

modeSelect.addEventListener(
    "change",
    function() {

        fetch(
            "/set_mode",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({
                    mode: this.value
                })
            }
        );
    }
);

</script>

</body>
</html>
